services:
  backend-blue:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: bikeoasis-backend:latest
    container_name: bikeoasis-backend-blue
    env_file:
      - ./env/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    networks:
      - bikeoasis-net

  backend-green:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: bikeoasis-backend:latest
    container_name: bikeoasis-backend-green
    env_file:
      - ./env/.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped
    networks:
      - bikeoasis-net

  frontend-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: bikeoasis-frontend:latest
    container_name: bikeoasis-frontend-web
    env_file:
      - ./env/.env.prod
    restart: unless-stopped
    networks:
      - bikeoasis-net

  nginx:
    image: nginx:1.27-alpine
    container_name: bikeoasis-nginx
    depends_on:
      - backend-blue
      - backend-green
      - frontend-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
      - ./runtime/challenges:/var/www/certbot:ro
      - ./runtime/certs:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - bikeoasis-net

networks:
  bikeoasis-net:
    driver: bridge
