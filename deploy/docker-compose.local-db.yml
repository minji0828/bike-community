version: "3.9"

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bikeoasis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${LOCAL_DB_PORT:-15432}:5432"
    volumes:
      - bikeoasis-postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bikeoasis"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  bikeoasis-postgis-data:
