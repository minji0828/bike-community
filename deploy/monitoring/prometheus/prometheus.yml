global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "bikeoasis-backend-blue"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend-blue:8080"]

  - job_name: "bikeoasis-backend-green"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend-green:8080"]
