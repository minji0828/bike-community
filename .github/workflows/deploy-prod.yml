name: Deploy Production (EC2)

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - "frontend/mobile/**"
      - "deploy/**"
      - ".github/workflows/deploy-prod.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/mobile/package-lock.json

      - name: Build frontend web
        working-directory: frontend/mobile
        run: |
          npm ci
          npm run build:web

      - name: Upload deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend,deploy,frontend/mobile/dist-web"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Run deployment scripts on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            chmod +x deploy/scripts/*.sh

            if [ ! -f deploy/env/.env.prod ]; then
              echo "deploy/env/.env.prod not found. Copy from deploy/env/.env.prod.example and fill secrets."
              exit 1
            fi

            deploy/scripts/deploy_backend.sh

            tar -czf /tmp/frontend-dist.tar.gz -C frontend/mobile dist-web
            deploy/scripts/deploy_frontend.sh /tmp/frontend-dist.tar.gz
