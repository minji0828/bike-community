name: Deploy Production (EC2)

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "백엔드 배포 수행"
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: "프론트 웹 배포 수행"
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy inputs
        run: |
          if [[ "${{ inputs.deploy_backend }}" != "true" && "${{ inputs.deploy_frontend }}" != "true" ]]; then
            echo "At least one of deploy_backend or deploy_frontend must be true."
            exit 1
          fi

      - name: Setup Node
        if: ${{ inputs.deploy_frontend }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend web
        if: ${{ inputs.deploy_frontend }}
        working-directory: frontend
        run: |
          npm ci
          npm run check

      - name: Upload deployment files to EC2 (backend + frontend)
        if: ${{ inputs.deploy_frontend }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend,deploy,frontend"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Upload deployment files to EC2 (backend only)
        if: ${{ !inputs.deploy_frontend }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend,deploy"
          target: ${{ secrets.EC2_APP_DIR }}
          overwrite: true

      - name: Run deployment scripts on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            chmod +x deploy/scripts/*.sh

            if [ ! -f deploy/env/.env.prod ]; then
              echo "deploy/env/.env.prod not found. Copy from deploy/env/.env.prod.example and fill secrets."
              exit 1
            fi

            if [[ "${{ inputs.deploy_backend }}" == "true" ]]; then
              deploy/scripts/deploy_backend.sh
            fi

            if [[ "${{ inputs.deploy_frontend }}" == "true" ]]; then
              deploy/scripts/deploy_frontend.sh
            fi
