services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bikeoasis-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: bikeoasis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Seoul
    ports:
      - "15432:5432"
    volumes:
      - bikeoasis-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bikeoasis"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  bikeoasis-postgres-data:
